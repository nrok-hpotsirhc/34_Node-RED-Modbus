<script type="text/javascript">
    RED.nodes.registerType('modbus-read', {
        category: 'modbus',
        color: '#E9967A',
        defaults: {
            name: { value: '' },
            server: { value: '', type: 'modbus-client-config', required: true },
            fc: { value: '3' },
            address: { value: 0, validate: RED.validators.number() },
            quantity: { value: 1, validate: RED.validators.number() },
            addressOffset: { value: 'zero-based' },
            pollInterval: { value: 0, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 1,
        icon: 'serial.svg',
        paletteLabel: 'modbus read',
        label: function () {
            if (this.name) {
                return this.name;
            }
            var fcLabels = {
                '1': 'FC1 Coils',
                '2': 'FC2 DI',
                '3': 'FC3 HR',
                '4': 'FC4 IR'
            };
            var fc = fcLabels[this.fc] || 'FC' + this.fc;
            return fc + ' @' + (this.address || 0) + ' x' + (this.quantity || 1);
        },
        oneditprepare: function () {
            var fcSelect = $('#node-input-fc');
            var addressInput = $('#node-input-address');
            var addressOffsetSelect = $('#node-input-addressOffset');
            var addressHint = $('#modbus-read-address-hint');

            function updateAddressHint() {
                var fc = parseInt(fcSelect.val(), 10);
                var offset = addressOffsetSelect.val();
                var addr = parseInt(addressInput.val(), 10) || 0;

                var protocolAddr = (offset === 'one-based') ? Math.max(0, addr - 1) : addr;

                var prefixes = { 1: '0', 2: '1', 3: '4', 4: '3' };
                var prefix = prefixes[fc] || '';

                if (offset === 'one-based') {
                    addressHint.text('Datasheet: ' + prefix + String(addr).padStart(4, '0') + ' → Protocol: ' + protocolAddr);
                } else {
                    addressHint.text('Protocol address: ' + protocolAddr);
                }
            }

            fcSelect.on('change', updateAddressHint);
            addressInput.on('change keyup', updateAddressHint);
            addressOffsetSelect.on('change', updateAddressHint);
            updateAddressHint();
        }
    });
</script>

<script type="text/html" data-template-name="modbus-read">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Modbus Read">
    </div>

    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-cog"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>

    <div class="form-row">
        <label for="node-input-fc"><i class="fa fa-list"></i> Function Code</label>
        <select id="node-input-fc">
            <option value="1">FC 01 – Read Coils</option>
            <option value="2">FC 02 – Read Discrete Inputs</option>
            <option value="3">FC 03 – Read Holding Registers</option>
            <option value="4">FC 04 – Read Input Registers</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-address"><i class="fa fa-map-marker"></i> Start Address</label>
        <input type="text" id="node-input-address" placeholder="0">
    </div>

    <div class="form-row">
        <label for="node-input-quantity"><i class="fa fa-sort-numeric-asc"></i> Quantity</label>
        <input type="text" id="node-input-quantity" placeholder="1">
    </div>

    <div class="form-row">
        <label for="node-input-addressOffset"><i class="fa fa-arrows-h"></i> Address Mode</label>
        <select id="node-input-addressOffset">
            <option value="zero-based">Zero-based (protocol)</option>
            <option value="one-based">One-based (datasheet)</option>
        </select>
    </div>

    <div class="form-row" id="modbus-read-address-hint-row">
        <label>&nbsp;</label>
        <span id="modbus-read-address-hint" style="color: #888; font-size: 0.9em;"></span>
    </div>

    <div class="form-row">
        <label for="node-input-pollInterval"><i class="fa fa-clock-o"></i> Poll Interval (ms)</label>
        <input type="text" id="node-input-pollInterval" placeholder="0 = trigger only">
    </div>
</script>

<script type="text/html" data-help-name="modbus-read">
    <p>Reads data from a Modbus device using function codes FC 01–04.</p>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Server <span class="property-type">config node</span></dt>
        <dd>Select the Modbus client configuration node that defines the connection.</dd>
        <dt>Function Code <span class="property-type">select</span></dt>
        <dd>
            <ul>
                <li><b>FC 01</b> – Read Coils (boolean outputs)</li>
                <li><b>FC 02</b> – Read Discrete Inputs (boolean inputs)</li>
                <li><b>FC 03</b> – Read Holding Registers (read/write 16-bit)</li>
                <li><b>FC 04</b> – Read Input Registers (read-only 16-bit)</li>
            </ul>
        </dd>
        <dt>Start Address <span class="property-type">number</span></dt>
        <dd>The starting address to read from. Interpretation depends on the Address Mode setting.</dd>
        <dt>Quantity <span class="property-type">number</span></dt>
        <dd>Number of coils/registers to read. Max: 2000 for coils, 125 for registers.</dd>
        <dt>Address Mode <span class="property-type">select</span></dt>
        <dd>
            <b>Zero-based:</b> Address is used as-is (protocol level). Address 0 = first register.<br>
            <b>One-based:</b> Datasheet convention. Address 40001 refers to the first holding register (protocol offset 0). The node automatically subtracts 1.
        </dd>
        <dt>Poll Interval <span class="property-type">number</span></dt>
        <dd>
            Polling interval in milliseconds. Set to <code>0</code> for trigger-based operation (reads only when a message arrives at the input).
        </dd>
    </dl>

    <h3>Input</h3>
    <p>Any incoming message triggers a read operation. The message topic is preserved in the output.</p>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Standardized payload object containing:</dd>
    </dl>
    <pre>{
  "data": [1234, 5678],
  "buffer": "&lt;Buffer 04 d2 16 2e&gt;",
  "fc": 3,
  "fcName": "readHoldingRegisters",
  "address": 107,
  "quantity": 2,
  "unitId": 1,
  "timestamp": "2026-04-16T10:00:00.000Z",
  "connection": "tcp://192.168.1.100:502"
}</pre>

    <h3>Details</h3>
    <p>
        The <b>modbus-read</b> node reads data from a Modbus device through the configured client connection.
        It supports all four read function codes (FC 01–04) and provides a standardized output payload
        enriched with metadata.
    </p>
    <p>
        <b>Address Offset:</b> Modbus uses zero-based addressing at the protocol level, but device datasheets
        typically use one-based addressing with type prefixes (e.g., 40001 for the first holding register).
        Use the "One-based" mode to enter addresses as shown in your device datasheet.
    </p>
    <p>
        <b>Polling:</b> Set a poll interval > 0 to enable automatic periodic reads. Set to 0 to only
        read when triggered by an incoming message.
    </p>
</script>
