<script type="text/javascript">
    RED.nodes.registerType('modbus-in', {
        category: 'modbus',
        color: '#C7E9C0',
        defaults: {
            name: { value: '' },
            server: { value: '', type: 'modbus-server-config', required: true },
            filterFc: { value: 'all' },
            filterUnitId: { value: 'all' }
        },
        inputs: 0,
        outputs: 1,
        icon: 'bridge.svg',
        paletteLabel: 'modbus in',
        label: function () {
            if (this.name) {
                return this.name;
            }
            var parts = [];
            if (this.filterFc && this.filterFc !== 'all') {
                parts.push('FC' + this.filterFc);
            }
            if (this.filterUnitId && this.filterUnitId !== 'all') {
                parts.push('Unit ' + this.filterUnitId);
            }
            return parts.length > 0 ? 'In: ' + parts.join(', ') : 'modbus in';
        }
    });
</script>

    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-cog"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>

    <div class="form-row">
        <label for="node-input-filterFc"><i class="fa fa-filter"></i> Function Code</label>
        <select id="node-input-filterFc">

            <option value="1">FC 01 – Read Coils</option>
            <option value="2">FC 02 – Read Discrete Inputs</option>

            <option value="5">FC 05 – Write Single Coil</option>
            <option value="6">FC 06 – Write Single Register</option>
            <option value="15">FC 15 – Write Multiple Coils</option>

    <div class="form-row">

    </div>
</script>

<script type="text/html" data-help-name="modbus-in">
    <p>Receives incoming Modbus requests from external clients and injects them into the flow.</p>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Server <span class="property-type">config node</span></dt>
        <dd>The Modbus server configuration that defines the TCP listener.</dd>
        <dt>Function Code Filter <span class="property-type">select</span></dt>
        <dd>
            Filter incoming requests by function code. Select <b>All Function Codes</b> to receive
            every request, or choose a specific FC to only receive matching requests.
            <table>
                <tr><td>FC 01–04</td><td>Read requests (Coils, Discrete Inputs, Holding/Input Registers)</td></tr>
                <tr><td>FC 05, 06</td><td>Write single (Coil, Register)</td></tr>
                <tr><td>FC 15, 16</td><td>Write multiple (Coils, Registers)</td></tr>
            </table>
        </dd>
        <dt>Unit ID Filter <span class="property-type">select</span></dt>
        <dd>
            Filter by unit ID. Select <b>All Unit IDs</b> to receive requests for any
            unit, or specify a unit ID to filter. Multiple <b>modbus-in</b> nodes
            with different filters can share the same server config.
        </dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd>Auto-generated topic: <code>modbus:server:{requestType}</code></dd>
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Structured request object.</dd>
    </dl>

    <h4>Read Request (FC 01–04)</h4>
    <pre>{
  "type": "readHoldingRegisters",
  "fc": 3,
  "address": 107,
  "quantity": 2,
  "unitId": 1,
  "requestId": "uuid-v4"
}</pre>

    <h4>Write Request (FC 05, 06, 15, 16)</h4>
    <pre>{
  "type": "writeSingleRegister",
  "fc": 6,
  "address": 100,
  "value": 42,
  "unitId": 1,
  "requestId": "uuid-v4"
}</pre>

    <dl class="message-properties">
        <dt>payload.type <span class="property-type">string</span></dt>
        <dd>Human-readable request type, e.g. <code>readHoldingRegisters</code>, <code>writeSingleCoil</code>.</dd>
        <dt>payload.fc <span class="property-type">number</span></dt>
        <dd>Modbus function code (1–16).</dd>
        <dt>payload.address <span class="property-type">number</span></dt>
        <dd>Zero-based starting address.</dd>
        <dt>payload.quantity <span class="property-type">number</span></dt>
        <dd>Number of items requested (read requests only).</dd>
        <dt>payload.value <span class="property-type">number | boolean | array</span></dt>
        <dd>Value(s) to write (write requests only).</dd>
        <dt>payload.unitId <span class="property-type">number</span></dt>
        <dd>Target unit/slave ID.</dd>
        <dt>payload.requestId <span class="property-type">string</span></dt>
        <dd><b>Critical:</b> Unique request ID that must be passed to <b>modbus-out</b> for the response.
            If not returned within the response timeout, a Modbus exception 0x0B is sent automatically.</dd>
    </dl>

    <h3>Status Indicators</h3>
    <table>
        <tr><td>🟢 green/dot</td><td>Server listening, ready for requests</td></tr>
        <tr><td>🔵 blue/dot</td><td>Processing a request – shows FC and address</td></tr>
        <tr><td>🔴 red/ring</td><td>No server config selected or server config invalid</td></tr>
        <tr><td>🔴 red/dot</td><td>Server stopped</td></tr>
        <tr><td>⚪ grey/dot</td><td>Waiting for server to start</td></tr>
    </table>

    <h3>Details</h3>
    <p>
        The <b>modbus-in</b> node is the entry point for the <b>Dynamic Server Proxy</b> pattern.
        When an external Modbus client sends a request to the server, this node captures it
        and emits a structured message. Connect it to a function node or other logic, then
        send the result to a <b>modbus-out</b> node to complete the response.
    </p>
    <p>
        <b>Request timeout:</b> If no response is sent within the configured response timeout
        (set on the server config node), a Modbus exception 0x0B (Gateway Target Device Failed
        To Respond) is automatically returned to the client.
    </p>

    <h3>Example</h3>
    <pre>[modbus-in] → [function] → [modbus-out]

// In the function node:
const fc = msg.payload.fc;
const addr = msg.payload.address;
const qty = msg.payload.quantity;

// Look up your data source and build response
msg.payload = {
    requestId: msg.payload.requestId,
    data: getRegisters(addr, qty)
};
return msg;</pre>

    <h3>References</h3>
    <ul>
        <li><a href="https://modbus.org/specs.php">Modbus Application Protocol V1.1b3</a></li>
    </ul>
</script>
